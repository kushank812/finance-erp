version: "3.9"

services:
  db:
    image: postgres:16
    container_name: finance_db
    environment:
      POSTGRES_DB: finance_ap_ar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - finance_db_data:/var/lib/postgresql/data

volumes:
  finance_db_data:

